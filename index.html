<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mutility" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <title>Mutility</title>
  <style>
    :root {
      --bg: #000000;
      --card: #5DB7E8;
      --card-edge: rgba(0,0,0,0.06);
      --ink: #ffffff;
      --corner: rgba(255,255,255,0.55);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
      color: var(--ink);
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding:
        env(safe-area-inset-top, 0)
        env(safe-area-inset-right, 0)
        env(safe-area-inset-bottom, 0)
        env(safe-area-inset-left, 0);
    }

    .player {
      flex: 1 1 0;
      padding: 14px 14px 6px;
      min-height: 0;
      display: flex;
    }
    .player.top { padding: 6px 14px 7px; transform: rotate(180deg); }
    .player.bottom { padding: 7px 14px 14px; }

    .card {
      flex: 1 1 0;
      position: relative;
      background: var(--card);
      border-radius: 26px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-label {
      position: absolute;
      top: 7%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(20px, 4vh, 32px);
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--ink);
      pointer-events: none;
      white-space: nowrap;
    }

    .life {
      font-size: clamp(120px, 32vh, 260px);
      line-height: 1;
      font-weight: 400;
      letter-spacing: -0.04em;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      transition: transform 0.16s cubic-bezier(0.2, 0.8, 0.4, 1);
      will-change: transform;
    }
    .life.bump { transform: scale(1.07); }

    /* Tap halves cover the whole card */
    .tap-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      cursor: pointer;
      z-index: 2;
    }
    .tap-zone.minus { left: 0; }
    .tap-zone.plus { right: 0; }

    /* Corner markers (in card space) */
    .corner {
      position: absolute;
      bottom: 12px;
      font-size: 22px;
      font-weight: 400;
      color: var(--corner);
      pointer-events: none;
      z-index: 1;
      line-height: 1;
    }
    .corner.minus { left: 18px; }
    .corner.plus  { right: 18px; }

    /* Middle bar */
    .bar {
      flex: 0 0 auto;
      height: 64px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 64px;
      position: relative;
      z-index: 5;
    }
    .bar button {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--ink);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      padding: 0;
    }
    .bar button:active { opacity: 0.55; transform: scale(0.94); }
    .bar button svg { width: 32px; height: 32px; }
    .bar button[disabled] { opacity: 0.35; pointer-events: none; }

    /* Dice */
    .dice-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
      border-radius: inherit;
    }
    .die {
      position: absolute;
      width: 22%;
      aspect-ratio: 1 / 1;
      max-width: 140px;
      max-height: 140px;
      transform-origin: center;
      will-change: transform;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
      opacity: 0;
      transition: opacity 0.2s ease-out;
    }
    .die.show { opacity: 1; }
    .die svg { width: 100%; height: 100%; display: block; }
    .die-face {
      fill: #f6f3ec;
      stroke: rgba(0,0,0,0.16);
      stroke-width: 1.4;
    }
    .die-pip { fill: #1a1a1a; }
    .die.winner svg .die-face {
      fill: #fffacc;
    }

    /* Lock dice numbers upright on the rotated top card by counter-rotating
       the inner SVG when the parent player is rotated. The CSS class
       'top-die' is added by JS for top dice. */
    /* We don't counter-rotate — the die itself spins via JS. The face values
       just look correct since faces are symmetric in pips */

    /* Brief flash on life change */
    .card.flash::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      pointer-events: none;
      animation: flashFade 0.32s ease-out forwards;
      border-radius: inherit;
    }
    @keyframes flashFade {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>
  <section class="player top" id="player-top">
    <div class="card" id="card-top">
      <div class="player-label">Player 2</div>
      <div class="life" id="life-top">20</div>
      <span class="corner minus">−</span>
      <span class="corner plus">+</span>
      <div class="tap-zone minus" data-player="top" data-delta="-1"></div>
      <div class="tap-zone plus" data-player="top" data-delta="1"></div>
      <div class="dice-layer" id="dice-top"></div>
    </div>
  </section>

  <div class="bar">
    <button id="roll" aria-label="Roll dice">
      <!-- die + circular arrow -->
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="8" y="8" width="14" height="14" rx="2.5" fill="currentColor"/>
        <circle cx="12.5" cy="12.5" r="1.4" fill="#000"/>
        <circle cx="17.5" cy="17.5" r="1.4" fill="#000"/>
        <circle cx="17.5" cy="12.5" r="1.4" fill="#000"/>
        <circle cx="12.5" cy="17.5" r="1.4" fill="#000"/>
        <path d="M24 6 a10 10 0 0 1 1.5 13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M22.5 4 L25 6 L23 8.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </button>
    <button id="reset" aria-label="Reset life totals">
      <!-- circular refresh -->
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M27 16 a11 11 0 1 1 -3.2 -7.8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" fill="none"/>
        <path d="M27 5 L27 11 L21 11" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </button>
  </div>

  <section class="player bottom" id="player-bottom">
    <div class="card" id="card-bottom">
      <div class="player-label">Player 1</div>
      <div class="life" id="life-bottom">20</div>
      <span class="corner minus">−</span>
      <span class="corner plus">+</span>
      <div class="tap-zone minus" data-player="bottom" data-delta="-1"></div>
      <div class="tap-zone plus" data-player="bottom" data-delta="1"></div>
      <div class="dice-layer" id="dice-bottom"></div>
    </div>
  </section>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
